    <title>Card Matching Game</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <a class="navbar-name"> fast food card matching game</a>
            <div>
                <button id="reset" class="btn btn-danger ms-2 d-none">
                    reset
                </button>
            </div>
        </nav>
    </header>

    <div class='rules'>
        <h1>Rules</h1>
        <h2>Match each card with its corresponding food item in the least attempts</h2>
    </div>

    <div id="gameBoard"></div>

    <form id="scoreForm" class="d-none">

    </form>

    <footer>

        <a href="https://wave.webaim.org/report#/https://stephenruelas155-coder.github.io/didactic-octo-parakeet/" class="" target="_blank"> wave checker </a>
        <button id="themeToggle" class="btn btn-secondary">
            Toggle Theme
        </button>
